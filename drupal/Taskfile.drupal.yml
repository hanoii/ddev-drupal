#ddev-generated
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

silent: true

vars:
  WEBROOT: ""
  CONFIG_DIR: config

tasks:
  composer:needed:
    desc: Report which composer drupal modules are active in config
    vars:
      WR: '{{if .WEBROOT}}{{trimSuffix .WEBROOT "/"}}/{{end}}'
    cmds:
      - .ddev/drupal/scripts/composer-needed.sh "{{.WR}}" "{{.CONFIG_DIR}}"

  drush:uli:
    desc: A fancier drush:uli for our own ahoy commands
    cmds:
      - .ddev/drupal/scripts/drush-uli.sh {{.CLI_ARGS}}
