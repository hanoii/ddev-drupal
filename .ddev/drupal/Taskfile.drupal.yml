#ddev-generated
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  WEBROOT: ""
  CONFIG_DIR: config

tasks:
  composer:needed:
    desc: Report which composer drupal modules are active in config
    vars:
      WR: '{{if .WEBROOT}}{{trimSuffix .WEBROOT "/"}}/{{end}}'
    cmds:
      - |
        php -r '$composer = json_decode(file_get_contents("{{.WR}}composer.json"), TRUE); $deps = array_merge($composer["require"] ?? [], $composer["require-dev"] ?? []); foreach (array_keys($deps) as $package) { if (str_starts_with($package, "drupal/")) { $module = substr($package, strlen("drupal/")); if (!str_starts_with($module, "core")) { echo $module, PHP_EOL; } } }' | while read module; do
          if grep -rql "$module" {{.WR}}{{.CONFIG_DIR}} --include="*.yml" 2>/dev/null; then
            echo "✅ Being used: $module"
          else
            echo "❌ Not being used: $module"
          fi
        done

  drush:uli:
    desc: A fancier drush:uli for our own ahoy commands
    cmds:
      - .ddev/drupal/scripts/drush-uli.sh {{.CLI_ARGS}}
